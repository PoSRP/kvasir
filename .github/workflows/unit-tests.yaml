name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 1 * * 0'

jobs:
  test:
    if: github.repository_owner == 'PoSRP' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: selfhosted-kvasir
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y docker.io

      - run: ./build.sh test
