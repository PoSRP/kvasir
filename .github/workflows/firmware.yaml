name: Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 1 * * 0'

jobs:
  build:
    runs-on: selfhosted-kvasir
    steps:
      - run: sudo renice 10 -p $BASHPID
      - uses: actions/checkout@v6
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y docker.io
      - run: ./build.sh
